<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }} - {{ description }}</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --accent: #f97316; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        header { background: white; padding: 40px 0; border-bottom: 1px solid #e2e8f0; text-align: center; }
        .logo { font-size: 42px; font-weight: 800; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--accent); }
        .hero { padding: 60px 0; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: transform 0.2s; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-date { color: #64748b; font-size: 0.9rem; margin-bottom: 10px; }
        .card-title { font-size: 1.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 10px; }
        footer { text-align: center; padding: 60px; color: #64748b; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">
                <img src="/assets/images/logo.png" alt="kalyteres-agores.gr" style="height: 80px; vertical-align: middle; margin-bottom: 10px;">
            </a>
            <p>{{ description }}</p>
        </div>
    </header>

    <main class="container">
        <div class="grid">
            {% for article in articles %}
            <a href="{{ article.url }}" class="card">
                <img src="https://images.unsplash.com/photo-1558403194-611308249627?auto=format&fit=crop&w=600&q=80" alt="{{ article.title }}">
                <div class="card-content">
                    <div class="card-date">{{ article.date }}</div>
                    <div class="card-title">{{ article.title }}</div>
                </div>
            </a>
            {% endfor %}
        </div>
    </main>

    <footer>
        <p>&copy; 2026 kalyteres-agores.gr</p>
    </footer>
</body>
</html>
